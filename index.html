function defaultRecords(){
  const base = { students: {} };
  Object.keys(students).forEach(name => {
    base.students[name] = { logins: [], lessons: {} };
  });
  return base;
}

function mergeDefaults(data){
  const base = defaultRecords();
  if(!data || typeof data !== "object") return base;
  Object.keys(base.students).forEach(name => {
    const old = data.students?.[name] || {};
    base.students[name] = {
      logins: Array.isArray(old.logins) ? old.logins : [],
      lessons: old.lessons || {}
    };
  });
  return base;
}

function loadLocal(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return mergeDefaults(raw ? JSON.parse(raw) : null);
  } catch(e) {
    return defaultRecords();
  }
}

function saveLocal(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

async function saveRecords(){
  saveLocal();
  if(remoteReady && window.__saveRemoteRecords) {
    try { await window.__saveRemoteRecords(records); } catch(e) { console.warn("remote save failed", e); }
  }
}

function nowText(){
  return new Date().toLocaleString("zh-TW", {hour12:false});
}

function escapeHtml(str){
  return String(str ?? "").replace(/[&<>"']/g, s => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[s]));
}

function speak(text){
  if(!("speechSynthesis" in window)) {
    alert("此瀏覽器不支援語音報讀。");
    return;
  }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(String(text));
  const settings = getSpeechSettings();
  const voices = speechSynthesis.getVoices();
  const voice = voices.find(v => v.name === settings.voiceName);
  if(voice) u.voice = voice;
  u.lang = "zh-TW";
  u.rate = Number(settings.rate || 1);
  speechSynthesis.speak(u);
}

function getSpeechSettings(){
  try {
    return JSON.parse(localStorage.getItem("g5_speech_settings") || "{}");
  } catch(e) {
    return {};
  }
}

function setSpeechSettings(settings){
  localStorage.setItem("g5_speech_settings", JSON.stringify(settings));
}

window.openSettings = function(){
  document.getElementById("cover").classList.add("show");
  document.getElementById("settingsPanel").classList.add("open");
  populateVoices();
};
window.closeSettings = function(){
  document.getElementById("cover").classList.remove("show");
  document.getElementById("settingsPanel").classList.remove("open");
};
window.testVoice = function(){
  speak("這是報讀測試。請選擇最適合自己的語音和語速。");
};

function populateVoices(){
  const select = document.getElementById("voiceSelect");
  const rate = document.getElementById("rateRange");
  const label = document.getElementById("rateLabel");
  const settings = getSpeechSettings();
  const voices = speechSynthesis.getVoices().filter(v => v.lang.includes("zh") || v.lang.includes("en") || v.lang.includes("ja"));
  select.innerHTML = voices.map(v => `<option value="${escapeHtml(v.name)}">${escapeHtml(v.name)}（${escapeHtml(v.lang)}）</option>`).join("");
  if(settings.voiceName) select.value = settings.voiceName;
  rate.value = settings.rate || 1;
  label.textContent = `${rate.value}x`;
  select.onchange = () => setSpeechSettings({...getSpeechSettings(), voiceName: select.value, rate: rate.value});
  rate.oninput = () => {
    label.textContent = `${rate.value}x`;
    setSpeechSettings({...getSpeechSettings(), voiceName: select.value, rate: rate.value});
  };
}
if("speechSynthesis" in window) {
  speechSynthesis.onvoiceschanged = populateVoices;
}

          const scoreText = rec.highScore === null ? "尚未作答" : `最高分：${rec.highScore}`;
          const cls = rec.passed ? "score-pass" : (rec.highScore === null ? "" : "score-fail");
          return `<div class="lesson-card">
            <h3>${lesson.id}. ${escapeHtml(lesson.title)}</h3>
            <span class="score-pill ${cls}">${rec.passed ? "已通過 100分" : scoreText}</span>
            <p class="muted">作答次數：${rec.attempts.length}</p>
            <button onclick="startLesson(${lesson.id})">開始作答</button>
          </div>`;
        }).join("")}
      </div>
    </section>
  `;
};

window.startLesson = function(lessonId){
  currentLesson = lessonsData.find(l => l.id === lessonId);
  if(!currentLesson || !Array.isArray(currentLesson.questions) || currentLesson.questions.length === 0){
    alert("這一課題目尚未準備完成，請通知老師。");
    return;
  }
  currentQuestions = currentLesson.questions.map((q, idx) => ({...q, originalIndex: idx}));
  currentIndex = 0; answers = {}; reviewMode = false; reviewOriginalIndexes = [];
  quizStartTime = nowText();
  renderQuestion();
};

function optionLetter(i){ return ["A","B","C","D"][i] || String(i+1); }

window.renderQuestion = function(){
  const q = currentQuestions[currentIndex];
  const percent = Math.round(((currentIndex+1)/currentQuestions.length)*100);
  const selected = answers[currentIndex];
  app.innerHTML = `
    <div class="top-fixed">
      <div class="row space">
        <div><strong>${currentLesson.id}. ${escapeHtml(currentLesson.title)}</strong> ｜ ${reviewMode ? "錯題回顧" : "正式作答"}</div>
        <div class="row">
          <button class="ghost small" onclick="openSettings()">⚙️ 報讀設定</button>
          <button class="secondary small" onclick="renderStudentHome()">回課次</button>
        </div>
      </div>
      <div class="progress"><div style="width:${percent}%"></div></div>
      <div class="muted">第 ${currentIndex+1} / ${currentQuestions.length} 題</div>
    </div>
    <section class="card">
      <div class="qbox">
        <div class="row space">
          <h2>題目</h2>
          ${ttsButton(q.question, "🔊聽題目")}
        </div>
        <p style="font-size:22px;font-weight:800;">${escapeHtml(q.question)}</p>
      </div>
      <div style="margin-top:16px;">
        ${q.options.map((opt,i)=>`
          <div class="option ${selected===i ? "selected" : ""}" onclick="selectAnswer(${i})">
            <span class="letter">${optionLetter(i)}</span>
            <span style="flex:1;font-size:19px;">${escapeHtml(opt)}</span>
            ${ttsButton(`${optionLetter(i)}、${opt}`)}
          </div>
        `).join("")}
      </div>
      <div class="row space" style="margin-top:18px;">
        <button class="secondary" onclick="prevQuestion()" ${currentIndex===0?"disabled":""}>上一題</button>
        <div class="row">
          <button onclick="nextQuestion()" ${currentIndex===currentQuestions.length-1?"disabled":""}>下一題</button>
          <button class="good" onclick="submitQuiz()">交卷</button>
        </div>
      </div>
      <p class="muted">提醒：每題都可點選喇叭報讀；交卷後可看分數、錯題與詳答。</p>
    </section>
  `;
};

window.selectAnswer = function(i){ answers[currentIndex]=i; renderQuestion(); };
window.prevQuestion = function(){ if(currentIndex>0){currentIndex--; renderQuestion();} };
window.nextQuestion = function(){ if(currentIndex<currentQuestions.length-1){currentIndex++; renderQuestion();} };

window.submitQuiz = async function(){
  const unanswered = currentQuestions.map((_,i)=>i).filter(i => answers[i] === undefined);
  if(unanswered.length && !confirm(`尚有 ${unanswered.length} 題未作答，確定要交卷嗎？`)) return;

  let correct = 0;
  const wrongs = [];
  currentQuestions.forEach((q,i) => {
    const chosen = answers[i];
    const ok = chosen === q.answer;
    if(ok) correct++;
    else wrongs.push({
      originalIndex: q.originalIndex,
      question: q.question,
      options: q.options,
      answer: q.answer,
      chosen: chosen,
      explanation: q.explanation,
      paragraph: q.paragraph
    });
  });
  const score = Math.round((correct/currentQuestions.length)*100);
  const lessonRec = getLessonRecord(currentStudent, currentLesson.id);
  const effectiveScore = (reviewMode && wrongs.length===0) ? 100 : score;
  if(!reviewMode) {
    lessonRec.highScore = lessonRec.highScore === null ? score : Math.max(lessonRec.highScore, score);
    lessonRec.passed = lessonRec.passed || score === 100;
  } else {
    if(wrongs.length === 0) {
      lessonRec.highScore = 100;
      lessonRec.passed = true;
    }
  }
  lessonRec.attempts.push({
    mode: reviewMode ? "錯題回顧" : "完整作答",
    startedAt: quizStartTime,
    submittedAt: nowText(),
    score,
    effectiveScore,
    totalQuestions: currentQuestions.length,
    correct,
    wrongs
  });
  await saveRecords();
  renderResult(score, wrongs);
};

function renderResult(score, wrongs){
  const passed = (!reviewMode && score === 100) || (reviewMode && wrongs.length===0);
  app.innerHTML = `
    <section class="card">
      <div class="${passed ? "notice ok" : "notice bad-note"}">
        <h2 style="margin-top:0;">${passed ? "恭喜通過！" : "尚未通過，請進行錯題回顧"}</h2>
        <p style="font-size:24px;font-weight:900;">本次得分：${score} 分</p>
        <p>${passed ? "本課已達100分通過標準。" : "本課需100分才通過，可以先看錯題與詳答，再重新作答錯題。"}</p>
      </div>
      <div class="row" style="margin-top:16px;">
        ${wrongs.length ? `<button class="warn" onclick="startWrongReview()">錯題回顧重新作答</button>` : ""}
        <button onclick="renderStudentHome()">回課次選單</button>
      </div>
    </section>
    <section class="card">
      <h2>作答詳答</h2>
      ${currentQuestions.map((q,i)=>{
        const chosen = answers[i];
        const ok = chosen === q.answer;
        const expText = `【第${q.paragraph}段】${q.explanation}`;
        return `
          <details open>
            <summary>第 ${i+1} 題：${ok ? "答對" : "答錯"}</summary>
            <p><strong>題目：</strong>${escapeHtml(q.question)} ${ttsButton(q.question)}</p>
            <p><strong>你的答案：</strong>${chosen===undefined ? "未作答" : escapeHtml(optionLetter(chosen)+"、"+q.options[chosen])}</p>
            <p><strong>正確答案：</strong>${optionLetter(q.answer)}、${escapeHtml(q.options[q.answer])}</p>
            <div class="explain">
              <div class="row space">
                <strong>詳答</strong>
                ${ttsButton(expText, "🔊聽詳答")}
              </div>
              <p>${escapeHtml(expText)}</p>
            </div>
          </details>
        `;
      }).join("")}
    </section>
  `;
}

window.startWrongReview = function(){
  const wrongQs = currentQuestions
    .map((q,i)=>({q, i}))
    .filter(item => answers[item.i] !== item.q.answer)
    .map(item => item.q);
  if(!wrongQs.length) return alert("沒有錯題可以回顧。");
  currentQuestions = wrongQs;
  currentIndex = 0; answers = {}; reviewMode = true; quizStartTime = nowText();
  renderQuestion();
};

window.renderTeacherDashboard = function(){
  currentRole = "teacher";
  const rows = Object.keys(students).map(name => {
    const stu = records.students[name] || {logins:[],lessons:{}};
    const lastLogin = stu.logins.length ? stu.logins[stu.logins.length-1].time : "尚未登入";
    let totalAttempts = 0;
    const passedCount = lessonsData.filter(l => {
      const rec = stu.lessons?.[l.id];
      totalAttempts += rec?.attempts?.length || 0;
      return rec?.passed;
    }).length;
    return `<tr>
      <td><strong>${escapeHtml(name)}</strong></td>
      <td>${escapeHtml(lastLogin)}</td>
      <td>${totalAttempts}</td>
      <td>${passedCount} / 12</td>
      <td><button class="small" onclick='renderTeacherStudent(${JSON.stringify(name)})'>查看詳細紀錄</button></td>
    </tr>`;
  }).join("");
  app.innerHTML = `
    <div class="top-fixed">
      <div class="row space">
        <h2 style="margin:0;">教師管理介面</h2>
        <div class="row">
          <button class="ghost small" onclick="renderTeacherDashboard()">重新整理</button>
          <button class="warn small" onclick="exportRecords()">匯出紀錄JSON</button>
          <button class="bad small" onclick="clearAllRecords()">清除本機紀錄</button>
          <button class="secondary small" onclick="renderLogin()">登出</button>
        </div>
      </div>
    </div>
    <section class="card">
      <p class="muted">教師端不提供報讀功能；學生端題目、選項與詳答才有報讀按鈕。</p>
      <table>
        <thead><tr><th>學生</th><th>最後登入時間</th><th>總作答次數</th><th>通過課數</th><th>操作</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </section>
  `;
};

window.renderTeacherStudent = function(name){
  selectedStudentForTeacher = name;
  const stu = records.students[name] || {logins:[],lessons:{}};
  const loginList = stu.logins.length ? stu.logins.slice().reverse().map(x=>`<li>${escapeHtml(x.time)}</li>`).join("") : "<li>尚無登入紀錄</li>";
  const lessonBlocks = lessonsData.map(lesson => {
    const rec = stu.lessons?.[lesson.id] || {highScore:null,passed:false,attempts:[]};
    return `<details>
      <summary>${lesson.id}. ${escapeHtml(lesson.title)}｜最高分：${rec.highScore===null?"尚未作答":rec.highScore}｜作答次數：${rec.attempts.length}｜${rec.passed?"已通過":"未通過"}</summary>
      ${rec.attempts.length ? rec.attempts.map((a,idx)=>`
        <div class="card" style="box-shadow:none;margin:12px 0;background:#f8fafc;">
          <p><strong>第 ${idx+1} 次</strong>｜模式：${escapeHtml(a.mode)}｜開始：${escapeHtml(a.startedAt)}｜交卷：${escapeHtml(a.submittedAt)}｜分數：${a.score}</p>
          <p>答對：${a.correct} / ${a.totalQuestions}｜錯題數：${a.wrongs.length}</p>
          ${a.wrongs.length ? `<table>
            <thead><tr><th>題目</th><th>學生答案</th><th>正確答案</th><th>段落與詳解</th></tr></thead>
            <tbody>
              ${a.wrongs.map(w => `
                <tr>
                  <td>${escapeHtml(w.question)}</td>
                  <td>${w.chosen===undefined ? "未作答" : escapeHtml(optionLetter(w.chosen)+"、"+w.options[w.chosen])}</td>
                  <td>${escapeHtml(optionLetter(w.answer)+"、"+w.options[w.answer])}</td>
                  <td>${escapeHtml("【第"+w.paragraph+"段】"+w.explanation)}</td>
                </tr>`).join("")}
            </tbody>
          </table>` : `<p class="notice ok">本次沒有錯題。</p>`}
        </div>
      `).join("") : `<p class="muted">尚無作答紀錄。</p>`}
    </details>`;
  }).join("");
  app.innerHTML = `
    <div class="top-fixed">
      <div class="row space">
        <h2 style="margin:0;">${escapeHtml(name)} 詳細紀錄</h2>
        <button class="secondary small" onclick="renderTeacherDashboard()">← 回教師總覽</button>
      </div>
    </div>
    <section class="card">
      <h3>登入紀錄</h3>
      <ol>${loginList}</ol>
    </section>
    <section class="card">
      <h3>各課成績與每次錯題</h3>
      ${lessonBlocks}
    </section>
  `;
};

window.exportRecords = function(){
  const blob = new Blob([JSON.stringify(records,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "潛能班國A組暑假作業紀錄.json";
  a.click();
  URL.revokeObjectURL(url);
};

window.clearAllRecords = async function(){
  if(!confirm("確定要清除本機紀錄嗎？若雲端同步啟用，重新載入可能仍會抓回雲端資料。")) return;
  records = defaultRecords();
  await saveRecords();
  renderTeacherDashboard();
};

// Firebase cloud storage
async function initOptionalFirebase(){
  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
    const { getFirestore, doc, setDoc, onSnapshot, getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
    const fbApp = initializeApp(firebaseConfig);
    const db = getFirestore(fbApp);
    const ref = doc(db, "homeworkRecords", FIREBASE_RECORD_DOC);

    window.__saveRemoteRecords = async (data) => {
      await setDoc(ref, { payload: data, updatedAt: new Date().toISOString() }, { merge: true });
    };

    const snap = await getDoc(ref);
    if(snap.exists() && snap.data().payload) {
      records = mergeDefaults(snap.data().payload);
      saveLocal();
    } else {
      await window.__saveRemoteRecords(records);
    }

    unsubscribeRemote = onSnapshot(ref, (s) => {
      if(s.exists() && s.data().payload) {
        records = mergeDefaults(s.data().payload);
        saveLocal();
        if(currentRole === "teacher") {
          if(selectedStudentForTeacher) renderTeacherStudent(selectedStudentForTeacher);
          else renderTeacherDashboard();
        } else if(currentRole === "student") {
          renderStudentHome();
        } else {
          updateSyncBadge();
        }
      }
    });
    remoteReady = true;
    updateSyncBadge();
  } catch(e) {
    console.warn("Firebase init failed; using localStorage only.", e);
    remoteReady = false;
    updateSyncBadge();
  }
}

renderLogin();
initOptionalFirebase();
</script>
